<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!--pesquisar-->
    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand">Agenda de Clientes</a>
            <form class="d-flex" role="search">
                <input id="pesquisarNome" class="form-control me-2" type="search" placeholder="Search"
                    aria-label="Search" />
                <button id="buscarNome" class="btn btn-outline-success" type="button">Search</button>
            </form>
        </div>
    </nav>

    <div class="d-flex justify-content-end align-items-center">
        <button class="btn btn-secondary rounded-circle m-3" data-bs-toggle="modal" data-bs-target="#meuModal">
            <i class="bi bi-plus-lg fs-5"></i>
        </button>
    </div>

    <!-- Estrutura do Modal -->
    <div class="modal fade" id="meuModal" tabindex="-1" aria-labelledby="tituloModal" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Cadastre um cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <!--conteudo-->
                    <div class="mb-3">
                        <label for="nomeCliente" class="form-label">Nome</label>
                        <input type="text" id="nomeCliente" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="telefoneCliente" class="form-label">Telefone</label>
                        <input type="text" id="telCliente" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="emailCliente" class="form-label">Email</label>
                        <input type="email" id="emailCliente" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="cpfCliente" class="form-label">CPF</label>
                        <input type="text" id="cpfCliente" class="form-control">
                    </div>

                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" id="btnCadastrar" class="btn btn-primary">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!--modal tabela clientes-->
    <div class="container d-flex justify-content-center">
        <div class="w-75">
            <table class="table  table-bordered text-center">
                <thead class="table-secondary">
                    <tr>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>CPF</th>
                        <th colspan="2">Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela">
                    <!-- os dados dos clientes vao ficar aqui -->
                </tbody>
            </table>
        </div>
    </div>


    <!-- modal editar dados -->
    <div class="modal fade" id="modalEditarCliente" tabindex="-1" aria-labelledby="modalEditarClienteLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalEditarClienteLabel">Editar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditarCliente">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label for="editNome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="editNome">
                        </div>
                        <div class="mb-3">
                            <label for="editTelefone" class="form-label">Telefone</label>
                            <input type="text" class="form-control" id="editTelefone">
                        </div>
                        <div class="mb-3">
                            <label for="editEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="editEmail">
                        </div>
                        <div class="mb-3">
                            <label for="editCPF" class="form-label">CPF</label>
                            <input type="text" class="form-control" id="editCPF">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="salvarEdicao">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>


    <script src="main.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
